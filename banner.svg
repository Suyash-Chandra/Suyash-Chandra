<path

d="M1140 295 L1140 235"

stroke="#E10600"

stroke-width="3">

<animate

attributeName="stroke-opacity"

values=".4;1;.4"

dur="3s"

repeatCount="indefinite"/>

</path>





<!-- SUYASH -->

<text

x="600"

y="145"

text-anchor="middle"

font-family="'Arial Black',sans-serif"

font-size="74"

font-style="italic"

font-weight="900"

letter-spacing="8"

fill="#ffffff"

opacity="0">

SUYASH

<animate

attributeName="opacity"

from="0"

to="1"

dur="1.2s"

fill="freeze"/>

<animateTransform

attributeName="transform"

type="translate"

values="0 25;0 0"

dur="1.2s"

fill="freeze"/>

</text>




<!-- CHANDRA -->

<text

x="600"

y="220"

