<!-- Bottom Right -->

<path

d="M1140 295 L1080 295"

stroke="#E10600"

stroke-width="3">

<animate

attributeName="stroke-opacity"

values=".4;1;.4"

dur="3s"

repeatCount="indefinite"/>

